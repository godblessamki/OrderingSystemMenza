name: CI Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore OrderingSystemMenza.slnx
    
    - name: Build
      run: dotnet build OrderingSystemMenza.slnx --no-restore --configuration Release
    
    - name: Test
      run: dotnet test OrderingSystemMenza.slnx --no-build --configuration Release --verbosity normal
